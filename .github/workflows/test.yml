name: Build and Push to Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-push-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # These must match the Secret names you set in GitHub
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Using your specific Docker Hub username
          tags: hackson1/attendance-app:latest

      - name: Run Smoke Test (Headless)
        run: |
          # Pull the image we just pushed to verify it works
          timeout 20s docker run -e QT_QPA_PLATFORM=offscreen hackson1/attendance-app:latest || echo "Build verified on GitHub