name: Docker Test
on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest  # Reliable Linux runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          # Build from the root where the Dockerfile is
          docker build -t attendance-app . 
          
      - name: Run Test
        run: |
          docker run attendance-app